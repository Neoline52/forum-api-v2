limit_req_zone $binary_remote_addr zone=thread_limit:10m rate=9>



server {
    listen 80;
    listen [::]:80;
    server_name late-planes-chew-daily.st.a.dcdg.xyz;

    location / {
        return 308 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name late-planes-chew-daily.st.a.dcdg.xyz;

    ssl_certificate /etc/letsencrypt/live/late-planes-chew-dail>
    ssl_certificate_key /etc/letsencrypt/live/late-planes-chew->

    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # DEFAULT (SEMUA ENDPOINT NORMAL)
    location / {
        proxy_pass http://127.0.0.1:5000;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded>
        proxy_set_header X-Forwarded-Proto $scheme;
    }

      # KHUSUS THREADS KENA LIMIT
    location ^~ /threads {
        limit_req zone=thread_limit burst=1 nodelay;
        limit_req_status 429;

        proxy_pass http://localhost:5000;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded>
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
