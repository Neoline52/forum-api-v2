name: CI

on:
  pull_request:
    branches: [ "main" ]

# MENAMBAHKAN BAGIAN INI: Mengatur folder kerja default
defaults:
  run:
    working-directory: forum-api

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: forumapi_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          
      - name: Install dependencies
        run: npm install

      - name: Run database migrations
        run: npm run migrate up
        env:
          PGUSER: postgres
          PGPASSWORD: password
          PGDATABASE: forumapi_test
          PGHOST: localhost
          PGPORT: 5432

      - name: Run tests
        run: npm test
        env:
          PGUSER: postgres
          PGPASSWORD: password
          PGDATABASE: forumapi_test
          PGHOST: localhost
          PGPORT: 5432
          ACCESS_TOKEN_KEY: supersecretkey
          REFRESH_TOKEN_KEY: supersecretkey
          NODE_ENV: test
