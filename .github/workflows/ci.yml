name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: forumapi_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      PGHOST: localhost
      PGUSER: postgres
      PGPASSWORD: password
      PGDATABASE: forumapi_test
      PGPORT: 5432
      ACCESS_TOKEN_KEY: secret
      REFRESH_TOKEN_KEY: secret
      ACCESS_TOKEN_AGE: 3000

    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: npm install

      - name: Run migrations
        run: npm run migrate:test

      - name: Run test
        run: npm test
