 name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: forumapi_test
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - run: npm install

      - run: npm run migrate:test

      - run: npm test
        env:
          PGUSER: postgres
          PGPASSWORD: password
          PGDATABASE: forumapi_test
          PGHOST: localhost
          PGPORT: 5432
          ACCESS_TOKEN_KEY: secret
          REFRESH_TOKEN_KEY: secret
